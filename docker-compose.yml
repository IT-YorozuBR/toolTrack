services:
  db:
    image: postgres:17-alpine
    container_name: prensa-stroke-db
    restart: unless-stopped
    # Credenciais vêm do .env (POSTGRES_USER/PASSWORD/DB). Nada sensível fica fixo aqui.
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Publica no host em 5433 (a 5432 já é usada pelo PostgreSQL instalado no Windows).
      # Use localhost:5433 para rodar migrations a partir da máquina; a app usa "db:5432".
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: prensa-stroke:latest
    container_name: prensa-stroke
    restart: unless-stopped
    # Lê as variáveis (incluindo DATABASE_URL) do arquivo .env ao lado deste compose.
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    # Só sobe a aplicação depois que o banco estiver realmente pronto.
    depends_on:
      db:
        condition: service_healthy
    # Permite também alcançar um Postgres no HOST via host.docker.internal, se um dia
    # quiser apontar para um banco externo em vez do container db. Inofensivo aqui.
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
